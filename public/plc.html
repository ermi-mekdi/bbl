<!DOCTYPE html>
<html lang="ti">
  <head>
    <title>ቦታ ኣብ መጽሓፍ ቅዱስ</title>
    <link rel="stylesheet" type="text/css" href="../stylesheet.css" />
    <link rel="icon" type="image/x-icon" href="../assets/faviacts.jpg" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />    
    
  </head>
  <body>
    <div class="bo">
      <div class="list">
        <div class="ppl">
          <h2>ኣስማት ቦታ</h2>
          <form>
            <input id="searchInput" type="text" placeholder="Search names..."> <button id="searchButton" type="button">search</button>
          </form>
          <div class="js-pplList">   </div>
        </div>
        <div class="detaile">
          <h2>ሓበሬታ ቦታ</h2>
          <div class="js-pplDetail"></div>

        </div>
      </div>
    </div>
    
    </div>
    <script>
      const pplListEl = document.querySelector('.js-pplList');
      const detailEl = document.querySelector('.js-pplDetail');
      let pplArray = []; // Declare outside for access in search

      function disPlc(p) {
        const title = p.title ? p.title.map((item) => `<li>${item}</li>`).join('') : '';
        const info = p.info ? p.info.map((item) => `<li>${item}</li>`).join('') : '';
        const vers = p.ver ? p.ver.map((item) => `<li>${item}</li>`).join('') : '';
        const gMap = p.gMap ? `<a href="${p.gMap}" target="_blank">Map</a>` : '';
        detailEl.innerHTML = `
        <h4> ${p.name1 || ''} (${p.nameE1 || ''})</h4>
        <h4> ${p.nameM1 || ''} </h4>
        <h4> ${p.name2 || ''} ${p.nameE2 || ''}</h4>
        <h4> ${p.nameM2 || ''} </h4>
        <h4> ID :  ${p.id || ''} </h4>
        <h4>${gMap}</h4>
        <ul>${vers}</ul>
        <ul>${info}</ul>
        `;
      }

      function renderList(list) {
        pplListEl.innerHTML = '';
        list.forEach(person => {
          if (!person) return;
          const li = document.createElement('li');
          li.style.cursor = 'pointer';
          li.textContent = person.name1 || person.nameE1 || person.name || person.id || 'Unknown';
          li.addEventListener('click', () => {
            disPlc(person);
          });
          pplListEl.appendChild(li);
        });
      }

      fetch('../data/plc.json')
        .then(r => r.json())
        .then(data => {
          pplArray = Array.isArray(data) ? data : Object.values(data);
          renderList(pplArray);
        })
        .catch(err => {
          console.error('Unable to load plc data', err);
        });

      const searchInput = document.getElementById('searchInput');
      const searchButton = document.getElementById('searchButton');

      function performSearch() {
        const query = searchInput.value.toLowerCase().trim();
        if (query === '') {
          renderList(pplArray);
        } else {
          const filtered = pplArray.filter(person => {
            if (!person) return false;
            const name1 = (person.name1 || '').toLowerCase();
            const name2 = (person.name2 || '').toLowerCase();
            const nameE1 = (person.nameE1 || '').toLowerCase();
            const name = (person.name || '').toLowerCase();
            return name1.includes(query) || name2.includes(query) || nameE1.includes(query) || name.includes(query);
          });
          renderList(filtered);
        }
        detailEl.innerHTML = '';
      }

      searchButton.addEventListener('click', performSearch);
      searchInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          performSearch();
        }
      });
    </script>
    

  </body>
</html>
