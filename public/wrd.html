<!DOCTYPE html>
<html lang="ti">
  <head>
    <title>መዝገበ ቃላት</title>
    <link rel="stylesheet" type="text/css" href="../stylesheet.css" />
    <link rel="icon" type="image/x-icon" href="../assets/faviacts.jpg" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />    
    
  </head>
  <body>
    <div class="bo">
      <div class="list">
        <div class="ppl">
          <h2>ቃላት</h2>
          <form>
            <input id="searchInput" type="text" placeholder="ዝተደልየ ቃል..."> <button id="searchButton" type="button">ድለ</button>
          </form>
          <div class="js-pplList">   </div>
        </div>
        <div class="detaile">
          <h2>ትርጉም</h2>
          <div class="js-pplDetail"></div>

        </div>
      </div>
    </div>
    
    </div>
    <script>
      const pplListEl = document.querySelector('.js-pplList');
      const detailEl = document.querySelector('.js-pplDetail');
      let pplArray = []; // Declare outside for access in search

      function disPlc(p) {
        const title = p.title ? p.title.map((item) => `<li>${item}</li>`).join('') : '';
        const info = p.info ? p.info.map((item) => `<li>${item}</li>`).join('') : '';
        const vers = p.ver ? p.ver.map((item) => `<li>${item}</li>`).join('') : '';
        const gMap = p.gMap ? `<a href="${p.gMap}" target="_blank">Map</a>` : '';
        detailEl.innerHTML = `
        <h4> ${p.value} </h4>
        <h4> ${p.d} </h4>
        
        `;
        console.log('Displaying details for:', p.value);
      }
      
      fetch('../data/word.json')
        .then(r => r.json())
        .then(data => {
          pplArray = Array.isArray(data) ? data : Object.values(data);
          renderList(pplArray);          
          console.log('Word data loaded:', data);
        })
        .catch(err => {
          console.error('Unable to load word data', err);
        });

      function renderList(list) {
        pplListEl.innerHTML = '';
        list.forEach(wrd => {
          if (!wrd) return;
          const li = document.createElement('li');
          li.style.cursor = 'pointer';
          li.textContent = wrd ? `${Object.keys(wrd)}: ${wrd.value}` : 'Unknown';
          li.addEventListener('click', () => {
            disPlc(wrd);
          });
          pplListEl.appendChild(li);
        });
      }

      

        
      ////Search

      const searchInput = document.getElementById('searchInput');
      const searchButton = document.getElementById('searchButton');


      function performSearch() {
        const query = searchInput.value.toLowerCase().trim();
        if (query === '') {
          renderList(pplArray);
        } else {
          const filtered = pplArray.filter(person => {
            if (!person) return false;
            const name1 = (person || '').toLowerCase();
            const name2 = (person.d || '').toLowerCase();
            
            return name1.includes(query) || name2.includes(query) || nameE1.includes(query) || name.includes(query);
          });
          renderList(filtered);
        }
        detailEl.innerHTML = '';
      }

      searchButton.addEventListener('click', performSearch);
      searchInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          performSearch();
        }
      });
    </script>
    

  </body>
</html>
